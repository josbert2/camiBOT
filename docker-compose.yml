services:
  postgres:
    image: postgres:16-alpine
    container_name: camibot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: camibot
      POSTGRES_PASSWORD: camibot
      POSTGRES_DB: camibot
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U camibot -d camibot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: camibot-redis
    restart: unless-stopped
    ports:
      - "6383:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
